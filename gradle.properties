# Build target: loads gradle/<device|emulator>.properties (LiteRT flags, etc.). Default is device.
# gyango.buildTarget=emulator
# Or: GYANGO_BUILD_TARGET=emulator ./gradlew :app:assembleDebug

android.useAndroidX=true
android.enableJetifier=true
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
org.gradle.configuration-cache=true

GYANGO_UPLOAD_STORE_FILE=gyango-upload-key.jks
GYANGO_UPLOAD_STORE_PASSWORD=gyango
GYANGO_UPLOAD_KEY_ALIAS=gyango_upload
GYANGO_UPLOAD_KEY_PASSWORD=gyango
